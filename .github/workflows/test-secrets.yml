name: 'ETL Shopee - Motoristas (TESTE)'

on:
  workflow_dispatch:

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Testar TODOS os secrets
        run: |
          echo "=== LISTANDO TODOS OS SECRETS SHOPEE_ ==="
          env | grep "^SHOPEE_" | sort
          echo "=========================================="
          
          echo ""
          echo "=== VALORES (primeiros 20 chars) ==="
          for var in $(env | grep "^SHOPEE_" | cut -d= -f1); do
            val="${!var}"
            echo "$var = ${val:0:20}..."
          done
          echo "======================================"

      - name: Testar cookies individualmente
        run: |
          echo "FMS_USER_SKEY: ${SHOPEE_FMS_USER_SKEY:0:20}..."
          echo "SPX_UK: ${SHOPEE_SPX_UK:0:20}..."
          echo "FMS_USER_ID: ${SHOPEE_FMS_USER_ID}"
          
          if [ -z "$SHOPEE_FMS_USER_SKEY" ]; then
            echo "❌ SHOPEE_FMS_USER_SKEY está VAZIO!"
            exit 1
          fi
          
          if [ -z "$SHOPEE_SPX_UK" ]; then
            echo "❌ SHOPEE_SPX_UK está VAZIO!"
            exit 1
          fi
          
          echo "✅ Todos os secrets principais estão presentes!"
